<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>铁路出行智能助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2b3b4c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 聊天容器 */
        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 85vh;
            background: #f8f9fc;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* 头部 */
        .chat-header {
            background: #1e2f3e;
            color: white;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2c4c6c;
        }
        .chat-header h2 {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .chat-header .train-icon {
            font-size: 28px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        .status-badge {
            margin-left: auto;
            background: #2e7d64;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #7befb2;
            border-radius: 50%;
            box-shadow: 0 0 6px #7befb2;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* 消息区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f0f2f5;
        }

        /* 消息气泡通用 */
        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            max-width: 85%;
            animation: fadeInUp 0.2s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.bot {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .user .avatar {
            background: #3b82f6;
            color: white;
        }
        .bot .avatar {
            background: #1e2f3e;
            color: #ffd966;
        }

        .bubble {
            background: white;
            padding: 12px 18px;
            border-radius: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            line-height: 1.5;
            font-size: 0.95rem;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .user .bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bot .bubble {
            background: white;
            border-bottom-left-radius: 4px;
            color: #1e2f3e;
        }

        /* 输入区域 */
        .input-area {
            background: white;
            padding: 16px 24px 24px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #cbd5e1;
            border-radius: 48px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            background: #fefefe;
        }
        .input-area input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .input-area button {
            background: #1e2f3e;
            border: none;
            color: white;
            padding: 12px 26px;
            border-radius: 48px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-area button:hover {
            background: #0f1e2a;
        }
        .input-area button:active {
            transform: scale(0.97);
        }

        /* 加载动画 */
        .typing-indicator {
            background: #e9eef3;
            padding: 12px 18px;
            border-radius: 20px;
            display: inline-flex;
            gap: 6px;
            align-items: center;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #5e7a93;
            border-radius: 50%;
            display: inline-block;
            animation: wave 1.2s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes wave {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* 滚动条 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 4px;
        }

        @media (max-width: 640px) {
            .chat-container { height: 90vh; border-radius: 24px; }
            .message { max-width: 95%; }
            .bubble { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <span class="train-icon">🚆</span>
        <h2>铁路出行问答助手</h2>
        <div class="status-badge">
            <span class="status-dot"></span>
            <span>本地AI在线</span>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <!-- 欢迎消息 -->
        <div class="message bot">
            <div class="avatar">🤖</div>
            <div class="bubble">您好！我是铁路出行助手，已为您加载官方12306 FAQ知识库。<br>您可以问我关于购票、退改签、儿童票、学生票、携带物品等问题，我会基于铁路规章为您解答。</div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="questionInput" placeholder="输入您的问题，例如：儿童票怎么买？" autofocus>
        <button id="sendBtn">发送 ✈️</button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const questionInput = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');

    // 辅助函数：添加消息到界面
    function addMessage(text, isUser) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.innerText = isUser ? '👤' : '🤖';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        // 支持换行符转义（后端返回可能带\n）
        bubble.innerText = text;
        messageDiv.appendChild(avatar);
        messageDiv.appendChild(bubble);
        chatMessages.appendChild(messageDiv);
        // 滚动到底部
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return messageDiv;
    }

    // 显示“正在输入”动画
    let typingDiv = null;
    function showTyping() {
        if (typingDiv) return;
        typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.innerHTML = `
            <div class="avatar">🤖</div>
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        `;
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTyping() {
        if (typingDiv) {
            typingDiv.remove();
            typingDiv = null;
        }
    }

    // 发送消息逻辑
    async function sendMessage() {
        const message = questionInput.value.trim();
        if (!message) return;

        // 清空输入框
        questionInput.value = '';
        // 添加用户消息
        addMessage(message, true);
        
        // 显示机器人正在输入
        showTyping();

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const data = await response.json();
            const reply = data.reply || '抱歉，没有获取到有效回复。';
            hideTyping();
            addMessage(reply, false);
        } catch (error) {
            console.error('请求失败:', error);
            hideTyping();
            addMessage('❌ 网络或服务器错误，请确保后端程序正常运行。', false);
        }
    }

    // 监听发送按钮
    sendBtn.addEventListener('click', sendMessage);
    
    // 监听输入框回车事件
    questionInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });

    // 页面加载完成后自动聚焦输入框
    window.addEventListener('load', () => {
        questionInput.focus();
    });
</script>
</body>
</html>
